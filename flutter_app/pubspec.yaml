name: my_territory_app
description: A native Flutter app for the My Territory experience.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Maps & Location (stable ecosystem)
  google_maps_flutter: ^2.6.0
  geolocator: ^14.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

  # Storage & Utilities
  shared_preferences: ^2.2.3
  crypto: ^3.0.3

  # Firebase (latest stable compatible line)
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
